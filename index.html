<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Dice Challenge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            font-family: "DM Sans", sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
            background-size:400% 400%;
            animation:bgMove 15s ease infinite;
            overflow:hidden;
        }

        @keyframes bgMove{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }

        }

        .card{

            width:90%;
            max-width:700px;

            padding:50px;

            border-radius:30px;

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.1);

            text-align:center;

            color:white;

            box-shadow:0 20px 50px rgba(0,0,0,.4);

            animation:float 6s ease-in-out infinite;

        }

        @keyframes float{

            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-10px);
            }

            100%{
                transform:translateY(0);
            }

        }

        h1{

            font-family:"Syne",sans-serif;

            font-size:3rem;

            margin-bottom:10px;

        }

        p{

            color:#cbd5e1;

            margin-bottom:40px;

            font-size:1.1rem;

        }

        .dice{

            font-size:70px;

            color:#60a5fa;

            animation:spin 8s linear infinite;

            margin-bottom:20px;

        }

        @keyframes spin{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

        .mode-btn{

            width:100%;

            padding:18px;

            margin-top:18px;

            border:none;

            border-radius:16px;

            font-size:18px;

            font-weight:700;

            cursor:pointer;

            transition:.3s;

            color:white;

            background:linear-gradient(135deg,#2563eb,#7c3aed);

        }

        .mode-btn:hover{

            transform:translateY(-4px);

            box-shadow:0 15px 35px rgba(37,99,235,.4);

        }

        .mode-btn i{

            margin-right:10px;

        }

        .footer{

            margin-top:35px;

            color:#94a3b8;

            font-size:.95rem;

        }

        .intro-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #0f172a, #020617);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: introFadeOut 1s ease 3s forwards;
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            animation: titleIn 1s ease;
        }

        .intro-sub {
            margin-top: 10px;
            color: #94a3b8;
            animation: subIn 1.2s ease;
        }

        /* Title animation */
        @keyframes titleIn {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtitle animation */
        @keyframes subIn {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Fade out intro screen */
        @keyframes introFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

    </style>

</head>

<body>

    <div id="introScreen" class="intro-screen">
        <h1 class="intro-title">Double Dice Challenge</h1>
        <p class="intro-sub">Loading game...</p>
    </div>

    <div class="card">

        <div class="dice">
            <i class="fa-solid fa-dice"></i>
        </div>

        <h1>Double Dice Challenge</h1>

        <p>
            Roll two dice and battle your opponent.
            <br>
            Get Double Six or have the highest total to win the round.
            <br><br>
            First to <strong>10 Wins</strong> takes the game.
        </p>

        <a href="pvc.html">
            <button class="mode-btn">
                <i class="fa-solid fa-desktop"></i>
                Human vs Computer
            </button>
        </a>

        <a href="pvp.html">
            <button class="mode-btn">
                <i class="fa-solid fa-users"></i>
                Human vs Human
            </button>
        </a>

    </div>

</body>

</html>
